<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="./assets/logos/favicon.ico.png" />
  <title>U.O.G.A. Hunt-Builder Resource Library</title>
  <script src="./embed-mode.js?v=20260422-embed-1"></script>
  <link rel="stylesheet" href="./style.css?v=20260423-planner-header-refine-1" />
  <link rel="stylesheet" href="./assets/css/hard-copy-public-library.css?v=20260528-folders-down-1" />
  <style>
    body { background:#110a05 !important; }
    .public-library-shell{width:100vw!important;min-height:100vh!important;padding:62px 0 28px!important;overflow-x:hidden!important;background:#110a05!important;}
    .library-wall-stage{position:relative!important;display:block!important;width:min(100vw,1920px)!important;min-height:0!important;margin:0 auto!important;overflow:visible!important;background:#110a05!important;}
    .library-wallpaper-img{display:block!important;width:100%!important;height:auto!important;position:relative!important;z-index:0!important;user-select:none!important;pointer-events:none!important;}
    .public-library-controls,.public-library-note{display:none!important;}
    .public-library-folders{position:absolute!important;left:50%!important;top:44%!important;transform:translateX(-50%)!important;width:min(920px,62%)!important;margin:0!important;display:grid!important;grid-template-columns:repeat(4,minmax(150px,1fr))!important;gap:14px!important;z-index:5!important;}
    .public-library-results{margin:18px auto 0!important;max-width:min(1500px,calc(100vw - 32px))!important;}
    .uoga-pdf-flip-panel{max-width:min(1500px,calc(100vw - 32px))!important;margin:24px auto 0!important;}
    .uoga-pdf-flipbook{min-height:820px!important;padding:24px!important;overflow:auto!important;background:radial-gradient(circle at center,rgba(255,214,140,.10),transparent 45%),rgba(7,3,1,.92)!important;}
    .uoga-pdf-spread{width:min(1380px,96vw)!important;display:grid!important;grid-template-columns:1fr 1fr!important;gap:18px!important;align-items:start!important;padding:18px!important;background:#2a160a!important;border-radius:12px!important;}
    .uoga-pdf-spread.cover,.uoga-pdf-spread.single{width:min(690px,96vw)!important;grid-template-columns:1fr!important;}
    .uoga-pdf-page canvas{width:100%!important;height:auto!important;display:block!important;}
    @media(max-width:1100px){.public-library-folders{top:42%!important;width:min(760px,84%)!important;grid-template-columns:repeat(2,minmax(180px,1fr))!important;}}
    @media(max-width:640px){.public-library-shell{padding-top:76px!important}.public-library-folders{position:relative!important;left:auto!important;top:auto!important;transform:none!important;width:min(420px,94vw)!important;margin:14px auto 0!important;grid-template-columns:1fr!important}.uoga-pdf-flipbook{min-height:520px!important;padding:12px!important}.uoga-pdf-spread{grid-template-columns:1fr!important;width:min(96vw,440px)!important}}
  </style>
  <script src="https://js.sentry-cdn.com/26137c5576f01423efc85f47076f9548.min.js" crossorigin="anonymous"></script>
  <script src="./sentry-browser-init.js"></script>
</head>
<body>
  <section class="page-nav-strip" aria-label="Site navigation">
    <div class="page-nav-case">
      <nav class="utility-nav">
        <a class="utility-link" href="./"><span>U.O.G.A. HOME</span></a>
        <a class="utility-link" href="./"><span>HUNT BUILDER</span></a>
        <a class="utility-link" href="./research.html"><span>HUNT RESEARCH</span></a>
        <a class="utility-link" href="./verify.html"><span>OUTFITTERS</span></a>
        <a class="utility-link active" href="./hard-copy.html" aria-current="page"><span>HUNTING BIBLE</span></a>
      </nav>
    </div>
  </section>

  <main class="public-library-shell" aria-label="U.O.G.A. Hunt-Builder public resource library">
    <section class="library-wall-stage">
      <img class="library-wallpaper-img" src="./assets/backgrounds/library-wallpaper.png" alt="U.O.G.A. Hunt-Builder Hard Copy Resource Library wall" onerror="this.onerror=null;this.src='./assets/backgrounds/LIBRARY-WALLPAPER.png';" />
      <div class="public-library-controls" hidden aria-hidden="true" aria-label="Search public hunt library">
        <input id="uogaLibrarySearch" class="public-library-search" type="search" placeholder="Search folders or files (rules, harvest, draw, permits, outfitters...)" autocomplete="off" />
        <button id="uogaLibraryClear" type="button" class="public-library-clear">Clear</button>
      </div>
      <p class="public-library-note" hidden aria-hidden="true">Curated public library only. Internal runtime and model files stay in research and hard-data systems.</p>
      <div id="uogaFolderWall" class="public-library-folders" aria-label="Public hunt library folders"></div>
    </section>

    <section id="uogaResultsPanel" class="public-library-results" aria-live="polite" aria-hidden="true" hidden>
      <header class="public-library-results-head">
        <h2 id="uogaResultsTitle">Filtered Results</h2>
        <span id="uogaLibraryCount">0 files</span>
      </header>
      <div id="uogaActiveFilters" class="public-library-active-filters"></div>
      <div id="uogaLibrarySections" class="public-library-results-grid"></div>
      <div id="uogaPdfFlipPanel" class="uoga-pdf-flip-panel" hidden>
        <div class="uoga-pdf-flip-head">
          <strong id="uogaPdfFlipTitle">PDF Viewer</strong>
          <div class="uoga-pdf-flip-actions">
            <a id="uogaPdfDownload" href="#" target="_blank" rel="noopener noreferrer">Download PDF</a>
            <button type="button" id="uogaPdfFlipClose">Close</button>
          </div>
        </div>
        <div class="uoga-pdf-flip-toolbar">
          <button type="button" id="uogaPdfPrev">Previous</button>
          <span id="uogaPdfStatus">Loading...</span>
          <button type="button" id="uogaPdfNext">Next</button>
        </div>
        <div id="uogaPdfFlipbook" class="uoga-pdf-flipbook"></div>
      </div>
      <div id="uogaEmbedPanel" class="uoga-embed-panel" hidden>
        <div class="uoga-embed-head">
          <strong id="uogaEmbedTitle">Embedded Resource</strong>
          <button type="button" id="uogaEmbedClose">Close</button>
        </div>
        <iframe id="uogaEmbedFrame" title="Embedded Public Resource" loading="lazy"></iframe>
      </div>
    </section>
  </main>

  <script src="./assets/js/hard-copy-public-library.js?v=20260528-step4-public-library-5"></script>
</body>
</html>
